---
name: ci tests
discover: npx vitest list --filesOnly
# No << test.atoms >> placeholder on purpose: per the testsuite reference,
# when the placeholder is absent the atoms arrive newline-delimited on the
# run command's STDIN. That sidesteps shell interpolation entirely — paths
# with parentheses (src/app/(auth)/*.test.ts), quotes, or spaces can never
# hit bash parsing (bare interpolation was a hard bash syntax error on the
# (auth) route group). tr converts newlines to NULs; xargs -0 does no
# quote/backslash processing. -x fails loudly if the list ever exceeds one
# exec (a silent second batch would overwrite the shared --outputFile);
# -r skips the run on an empty shard instead of running the entire suite.
run: tr '\n' '\0' | xargs -0 -r -x npx vitest run --reporter=junit --outputFile="<< outputs.junit >>" --bail 0
outputs:
  junit: test-reports/tests.xml
