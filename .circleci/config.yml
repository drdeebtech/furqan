version: 2.1

# ────────────────────────────────────────────────────────────────
# FURQAN Academy — CircleCI CI Pipeline
#
# Required CircleCI project environment variables (Settings → Env Vars):
#   NEXT_PUBLIC_SUPABASE_URL       — Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  — Supabase anon key
#   SUPABASE_SERVICE_ROLE_KEY      — for RLS tests that need admin client
#
# Supabase migrations + drift checks remain in GitHub Actions
# (supabase-migrate.yml, migration-drift.yml) — they use the
# supabase/setup-cli GHA action and SUPABASE_DB_PASSWORD secret.
#
# Lint runs as the `lint` job below (issue #325 cleared the 26-error
# backlog). Mirrored in rls-tests.yml (GHA) for parity.
# ────────────────────────────────────────────────────────────────

orbs:
  node: circleci/node@6.1

executors:
  node-24:
    docker:
      - image: cimg/node:24.15
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    resource_class: medium

jobs:
  # ── Install dependencies ──────────────────────────────────────
  install:
    executor: node-24
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          cache-path: ~/project/node_modules
          override-ci-command: npm ci
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  # ── TypeScript type-check ─────────────────────────────────────
  typecheck:
    executor: node-24
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: tsc --noEmit
          command: npx tsc --noEmit

  # ── ESLint ────────────────────────────────────────────────────
  # Re-enabled once the 26-error backlog was cleared (issue #325).
  lint:
    executor: node-24
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: eslint
          command: npm run lint

  # ── Unit tests via Smarter Testing ───────────────────────────
  # Uses circleci run testsuite which enables:
  #   - Test Impact Analysis (run only impacted tests)
  #   - Dynamic Test Splitting (parallel execution)
  #   - Auto Rerun Failed Tests (flake resilience)
  # See .circleci/test-suites.yml for discovery + run config.
  unit-test:
    executor: node-24
    parallelism: 2
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run vitest via testsuite
          command: circleci run testsuite "ci tests"
      - store_test_results:
          path: test-reports

  # ── Next.js production build (main only) ─────────────────────
  # Vercel owns the authoritative build on deploy; this catches
  # build-breaking changes before they reach main.
  build:
    executor: node-24
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: next build
          command: npm run build

  # ── Playwright E2E collection gate ──────────────────────────
  # No existing CI job runs the Playwright suite — the executor pins
  # PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 and no live Supabase backend is
  # available in CI, so a full `playwright test` run cannot execute here.
  # As a baseline gate we run `--list`, which collects every spec (imports
  # resolved, test() calls parsed, fixtures hydrated) without needing a
  # browser or a running app. This catches the regression class that broke
  # e2e/auth-smoke.spec.ts on 2026-05-04: a syntactically-invalid spec or
  # a bad import that only surfaces at collection time. The full green run
  # is the responsibility of local dev / preview-deploy smoke (see
  # e2e/auth-smoke.spec.ts header for the preview-deploy flow).
  #
  # Non-blocking: listed in the workflow but NOT a requirement for `build`,
  # so a collection failure surfaces loudly without gating merges until the
  # full e2e pipeline is wired.
  e2e-collect:
    executor: node-24
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: playwright test --list (collect-only)
          command: npx playwright test --list

workflows:
  ci:
    jobs:
      - install

      # typecheck after install
      - typecheck:
          requires:
            - install

      # eslint after install (independent of typecheck)
      - lint:
          requires:
            - install

      # unit tests after install (independent of typecheck)
      - unit-test:
          requires:
            - install

      # e2e collection gate after install (non-blocking; see job comment)
      - e2e-collect:
          requires:
            - install

      # build only on main, after all checks pass
      - build:
          requires:
            - typecheck
            - lint
            - unit-test
          filters:
            branches:
              only: main
