name: Supabase Migrate

# Runs `supabase db push` from CI so deploys never depend on the Branching
# GitHub integration silently doing the right thing. The integration has
# silently skipped applies more than once on this account (2026-04-26 +
# 2026-05-01..02 + 2026-05-03), each time leaving prod schema behind the
# repo until manually caught. This workflow makes the apply loud and
# auditable: a failed `db push` becomes a failed CI step that can be re-run.
#
# Behaviour:
#   - pull_request touching supabase/migrations/** → dry-run only (validate)
#   - push to main touching supabase/migrations/** → real push
#   - workflow_dispatch                            → real push (manual hotfix)
#
# Required secrets:
#   - SUPABASE_ACCESS_TOKEN  (already exists, used by migration-drift.yml)
#   - SUPABASE_DB_PASSWORD   (NEW — settings → secrets → actions; the
#                             Postgres password from Supabase project
#                             Database settings)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"

# Serialize runs so two concurrent pushes can't race against the same DB.
concurrency:
  group: supabase-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: supabase db push
    runs-on: ubuntu-latest
    # Skip on forks — they don't have access to repo secrets and the run
    # would just fail to authenticate. Internal PRs and pushes work normally.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is unset. Add it under Settings → Secrets → Actions (find the value in Supabase Dashboard → Project Settings → Database → Connection string)."
            exit 1
          fi
          supabase link --project-ref xyqscjnqfeusgrhmwjts

      - name: Dry-run (PR validation)
        if: github.event_name == 'pull_request'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "::group::Migrations that would be applied"
          supabase db push --dry-run
          echo "::endgroup::"

      - name: Apply migrations (push to main / manual dispatch)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push

      - name: Verify tracker is in sync
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "::group::Final migration state"
          supabase migration list --linked
          echo "::endgroup::"
