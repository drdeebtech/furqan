name: Supabase Migrate

# Runs `supabase db push` from CI so deploys never depend on the Branching
# GitHub integration silently doing the right thing. The integration has
# silently skipped applies more than once on this account (2026-04-26 +
# 2026-05-01..02 + 2026-05-03), each time leaving prod schema behind the
# repo until manually caught. This workflow makes the apply loud and
# auditable: a failed `db push` becomes a failed CI step that can be re-run.
#
# Behaviour:
#   - pull_request                                    → NO credentialed run.
#       Migration validation on PRs is non-credentialed and handled by
#       migrations-fresh-apply.yml (applies ALL migrations from zero on a local
#       DB) + migration-safety.yml (expand/contract DDL guard). This job never
#       exposes a db password or a GitHub Environment to PR-controlled code
#       (the local supabase-setup action runs the PR branch's code).
#   - push to main touching supabase/migrations/**    → real push to PRODUCTION db
#   - push to staging touching supabase/migrations/** → real push to STAGING db
#   - workflow_dispatch                               → real push (manual hotfix)
#
# Per-environment target (GitHub Environments):
#   For push/dispatch the job picks the `production` or `staging` environment
#   from the branch (staging branch → `staging`, else `production`). PRs resolve
#   to NO environment, so environment secrets are never available to PR jobs.
#   Environment-scoped values override the repo-level defaults, so PRODUCTION
#   keeps working unchanged with the existing repo-level var + secrets, and only
#   STAGING needs new values added.
#
# Required config:
#   - SUPABASE_ACCESS_TOKEN  (repo secret; shared — both projects live on the
#                             same Supabase account. Used by migration-drift.yml too.)
#   - SUPABASE_DB_PASSWORD   (repo secret = PRODUCTION db password. Add a
#                             `staging` Environment secret of the SAME name set
#                             to the STAGING db password.)
#   - SUPABASE_PROJECT_REF   (repo var = PRODUCTION ref. Add a `staging`
#                             Environment var of the SAME name = the staging
#                             project ref, cbavvgjupcinmtwsmwlo.)

on:
  workflow_dispatch:
  pull_request:
    branches: [main, staging]  # only PRs targeting a deploy branch; PR runs are non-credentialed
  push:
    branches: [main, staging]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"

permissions:
  contents: read

# Serialize runs so two concurrent pushes can't race against the same DB.
concurrency:
  group: supabase-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Route the apply to the right database from the branch (push/dispatch only):
    # the staging branch resolves to the `staging` environment's
    # SUPABASE_PROJECT_REF + SUPABASE_DB_PASSWORD; everything else resolves to
    # `production`. Pull requests resolve to NO environment, so environment
    # secrets are never exposed to PR-controlled code. Repo-level var/secrets
    # stay the production defaults — production applies exactly as before.
    environment: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/staging' && 'staging' || 'production') || '' }}
    # Skip on forks — they don't have access to repo secrets and the run
    # would just fail to authenticate. Internal PRs and pushes work normally.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    # GitHub deprecated Node.js 20 for actions on 2025-09-19 and will force
    # Node 24 by 2026-06-02. supabase/setup-cli@v1 still ships Node 20 as
    # of 2026-05; opt into Node 24 now so this workflow keeps running
    # without requiring an emergency upgrade in 4 weeks.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: PR validation is non-credentialed (handled by sibling workflows)
        if: github.event_name == 'pull_request'
        run: |
          echo "This credentialed migrate job does not run on pull_request —"
          echo "no db password or GitHub Environment is exposed to PR-controlled code."
          echo "Migration validation on PRs is non-credentialed and handled by:"
          echo "  - migrations-fresh-apply.yml  (applies ALL migrations from zero on a local DB)"
          echo "  - migration-safety.yml        (expand/contract DDL guard)"
      - name: Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Supabase CLI + link project
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/supabase-setup
        with:
          project-ref: ${{ vars.SUPABASE_PROJECT_REF }}
          access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          db-password: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify SUPABASE_DB_PASSWORD is set
        if: github.event_name != 'pull_request'
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is unset. Add it under Settings → Secrets → Actions (find the value in Supabase Dashboard → Project Settings → Database → Connection string)."
            exit 1
          fi

      - name: Guard — staging branch must resolve the staging project
        # Fail-closed: if the `staging` GitHub Environment is missing or lacks
        # SUPABASE_PROJECT_REF, vars fall back to the repo-level (PRODUCTION)
        # values — a staging push would silently migrate prod. The project ref
        # is public (it's in the site's client bundle), so pinning it here
        # leaks nothing.
        if: github.ref == 'refs/heads/staging' && github.event_name != 'pull_request'
        env:
          RESOLVED_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          if [ "$RESOLVED_REF" != "cbavvgjupcinmtwsmwlo" ]; then
            echo "::error::Staging push resolved SUPABASE_PROJECT_REF='$RESOLVED_REF', expected the staging project (cbavvgjupcinmtwsmwlo). The 'staging' GitHub Environment is missing or misconfigured — refusing to apply staging migrations to the production database. Create the environment per the header comment."
            exit 1
          fi

      - name: Apply migrations (push to main / manual dispatch)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # --include-all applies pending migrations even when one has an
          # EARLIER timestamp than the most-recently-applied one on the remote
          # DB (Supabase CLI's out-of-order guard would otherwise exit 1). The
          # guard protects against accidental backdating; here timestamps are
          # generated, not hand-typed, so it's a false positive. Required for
          # parallel-PR workflows where a later-timestamped migration may
          # land in main before an earlier-timestamped one (happened
          # 2026-05-06 with the session-modes Stage 7 → Stages 2/3/5
          # merge order, which advanced the remote tracker past Stages
          # 2/3/5's timestamps).
          supabase db push --include-all

      - name: Verify tracker is in sync
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "::group::Final migration state"
          supabase migration list --linked
          echo "::endgroup::"
