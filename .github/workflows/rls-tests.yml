name: Unit Tests (RLS + Silent-Fail Guard + Type-Check + ...)

on:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "vitest.config.ts"
      - "tsconfig.json"
      - ".github/workflows/rls-tests.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tsconfig.json"

jobs:
  unit:
    name: vitest run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit) — catches drift that vitest can't see
        run: npx tsc --noEmit

      - name: Run vitest (RLS regression + silent-fail guard + helpers)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::warning::Supabase env vars not set in repo Secrets — network-touching tests will skip; static checks still run."
          fi
          npm run test:unit
