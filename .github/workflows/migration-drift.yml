name: Migration Drift Check

on:
  pull_request:
    paths:
      - "src/lib/supabase/migrations/**"
  push:
    branches: [main]
    paths:
      - "src/lib/supabase/migrations/**"

jobs:
  drift-check:
    name: schema_migrations vs repo files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare repo migrations vs production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: xyqscjnqfeusgrhmwjts
        run: |
          set -e

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping drift check. Add it in repo Settings → Secrets."
            exit 0
          fi

          # Fetch applied migration versions from the production schema_migrations table.
          # Uses the Supabase Management API instead of opening a Postgres connection.
          response=$(curl -sS \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
            -d '{"query":"select version, applied_at from public.schema_migrations order by applied_at"}')

          # Sanity check the response.
          if ! echo "$response" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::error::Supabase API returned an unexpected response:"
            echo "$response"
            exit 1
          fi

          # Sorted list of applied versions, one per line.
          applied=$(echo "$response" | jq -r '.[].version' | sort -u)

          # Sorted list of repo versions: take the leading vXX_YYY chunk from each filename.
          repo=$(ls src/lib/supabase/migrations/ \
            | grep -Eo '^v?[0-9]+_[0-9]+' \
            | sort -u)

          # Show what's in each set for the build log.
          echo "=== Applied migrations (production) ==="
          echo "$applied"
          echo
          echo "=== Repo migration files ==="
          echo "$repo"
          echo

          # The drift: any repo version NOT in the applied set.
          missing=$(comm -23 <(echo "$repo") <(echo "$applied") || true)

          if [ -n "$missing" ]; then
            echo "::error::Migration drift detected — these files exist in the repo but have NOT been applied to production:"
            echo "$missing" | sed 's/^/  - /'
            echo
            echo "::error::Apply them via Supabase Dashboard → SQL Editor before merging."
            exit 1
          fi

          # Ordering check — applied_at order must match lex (file) order.
          applied_in_apply_order=$(echo "$response" | jq -r '.[].version')
          applied_sorted=$(echo "$applied_in_apply_order" | sort)
          if ! diff -q <(echo "$applied_in_apply_order") <(echo "$applied_sorted") >/dev/null; then
            echo "::warning::Migrations were applied OUT OF ORDER. Lex sort vs apply order differ:"
            diff <(echo "$applied_in_apply_order") <(echo "$applied_sorted") | head -40
            echo "::warning::This often means a migration was force-applied later than its filename suggests. Verify schema state manually."
          fi

          echo "✓ All repo migrations are applied in production."
