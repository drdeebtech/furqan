name: Migration Drift Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/lib/supabase/migrations/**"
      - "supabase/migrations/**"
      - ".github/workflows/migration-drift.yml"
  # Race-free post-merge check: only run after Supabase Migrate has
  # finished applying on main. Previously this fired on `push: main` in
  # parallel with Supabase Migrate, often querying the Branching tracker
  # before migrate had registered the new file → noisy false-positive
  # failures (~34/90 in the 48h preceding 2026-05-06). The workflow_run
  # trigger fires only after Supabase Migrate's run completes, eliminating
  # the race. The `if:` on each job filters out failed-migrate runs so
  # we don't pile a drift error on top of an apply failure.
  workflow_run:
    workflows: ["Supabase Migrate"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: migration-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: schema_migrations vs repo files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compare repo migrations vs production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -e

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping drift check. Add it in repo Settings → Secrets."
            exit 0
          fi

          # Fetch applied migration versions from the production schema_migrations table.
          # Uses the Supabase Management API instead of opening a Postgres connection.
          response=$(curl -sS \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
            -d '{"query":"select version, applied_at from public.schema_migrations order by applied_at"}')

          # Sanity check the response.
          if ! echo "$response" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::error::Supabase API returned an unexpected response:"
            echo "$response"
            exit 1
          fi

          # Sorted list of applied versions, one per line.
          applied=$(echo "$response" | jq -r '.[].version' | sort -u)

          # Sorted list of repo versions: take the leading vXX_YYY chunk from each filename.
          repo=$(ls src/lib/supabase/migrations/ \
            | grep -Eo '^v?[0-9]+_[0-9]+' \
            | sort -u)

          # Show what's in each set for the build log.
          echo "=== Applied migrations (production) ==="
          echo "$applied"
          echo
          echo "=== Repo migration files ==="
          echo "$repo"
          echo

          # The drift: any repo version NOT in the applied set.
          missing=$(comm -23 <(echo "$repo") <(echo "$applied") || true)

          if [ -n "$missing" ]; then
            echo "::error::Migration drift detected — these files exist in the repo but have NOT been applied to production:"
            echo "$missing" | sed 's/^/  - /'
            echo
            echo "::error::Apply them via Supabase Dashboard → SQL Editor before merging."
            exit 1
          fi

          # Ordering check — applied_at order must match lex (file) order.
          applied_in_apply_order=$(echo "$response" | jq -r '.[].version')
          applied_sorted=$(echo "$applied_in_apply_order" | sort)
          if ! diff -q <(echo "$applied_in_apply_order") <(echo "$applied_sorted") >/dev/null; then
            echo "::warning::Migrations were applied OUT OF ORDER. Lex sort vs apply order differ:"
            diff <(echo "$applied_in_apply_order") <(echo "$applied_sorted") | head -40
            echo "::warning::This often means a migration was force-applied later than its filename suggests. Verify schema state manually."
          fi

          echo "✓ All repo migrations are applied in production."

  branching-drift-check:
    name: supabase_migrations.schema_migrations vs supabase/migrations files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip on pull_request — Supabase Migrate is dry-run on PRs (per
    # CLAUDE.md "Database Migrations Policy"), so any new file added in
    # the PR is correctly absent from the Branching tracker until merge.
    # The workflow_run trigger above re-runs this job after the post-merge
    # apply finishes on main, where the assertion is meaningful.
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compare supabase/migrations against the Branching tracker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -e

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping Branching drift check. Add it in repo Settings → Secrets."
            exit 0
          fi

          # The Branching integration writes applied versions to
          # supabase_migrations.schema_migrations (note: the supabase_migrations
          # SCHEMA, not public). On 2026-05-02 we discovered the integration was
          # silently skipping applies for an entire week — five files in a row
          # never registered, even though their SQL was applied via the
          # documented hotfix path. This check exists so that gap is loud.
          response=$(curl -sS \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
            -d '{"query":"select version from supabase_migrations.schema_migrations order by version"}')

          if ! echo "$response" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::error::Supabase API returned an unexpected response:"
            echo "$response"
            exit 1
          fi

          applied=$(echo "$response" | jq -r '.[].version' | sort -u)

          # Repo versions: leading 14-digit timestamp from each filename.
          repo=""
          if [ -d supabase/migrations ]; then
            repo=$(ls supabase/migrations/ \
              | grep -Eo '^[0-9]{14}' \
              | sort -u)
          fi

          echo "=== Applied (Branching tracker) ==="
          echo "$applied"
          echo
          echo "=== Repo timestamps ==="
          echo "$repo"
          echo

          missing=$(comm -23 <(echo "$repo") <(echo "$applied") || true)

          if [ -n "$missing" ]; then
            echo "::error::Branching drift — these timestamped migrations exist in supabase/migrations/ but have NOT been registered with the Branching tracker:"
            echo "$missing" | sed 's/^/  - /'
            echo
            echo "::error::If the SQL is already applied (e.g. via 'supabase db query --linked --file …'), backfill the tracker with scripts/backfill-branching-tracker.sql before merging — otherwise the next deploy will run with code that selects columns the production schema does not have."
            exit 1
          fi

          echo "✓ Every repo timestamp is registered with the Branching tracker."
