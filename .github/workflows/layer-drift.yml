name: Knowledge Graph Layer Drift

on:
  pull_request:  # No paths filter — job skips internally when no TS files changed

# gh pr view (relevance gate below) needs pull-requests:read. Without it the
# hardened default token (contents:read only) fails with "Resource not
# accessible by integration" on every PR.
permissions:
  contents: read
  pull-requests: read

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check if relevant files changed
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --json files \
            --jq '[.files[].path | select(test("^src/.*\\.tsx?$"))] | length')
          echo "relevant=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - if: steps.changes.outputs.relevant != 'true'
        run: echo "No TypeScript files changed — layer drift detection skipped."
      - if: steps.changes.outputs.relevant == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Check for unindexed files
        if: steps.changes.outputs.relevant == 'true'
        run: node scripts/detect-layer-drift.js --changed-only
