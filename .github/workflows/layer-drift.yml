name: Knowledge Graph Layer Drift

on:
  pull_request:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Check for unindexed files
        run: node scripts/detect-layer-drift.js --changed-only
