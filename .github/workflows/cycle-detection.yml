name: Import Cycle Detection

on:
  pull_request:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - ".understand-anything/knowledge-graph.json"

jobs:
  # Skip job runs when the paths filter doesn't match so this check never
  # blocks PRs that don't touch TS files (required-check safety valve).
  skip-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'pull_request' && !contains(toJSON(github.event.pull_request.changed_files), 'src/') }}
    steps:
      - run: echo "No TS files changed — skipping cycle detection"

  detect-cycles:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
      - name: Detect import cycles
        run: node scripts/detect-cycles.js
