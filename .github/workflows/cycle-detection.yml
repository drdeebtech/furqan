name: Import Cycle Detection

on:
  pull_request:  # No paths filter — job skips internally when no TS files changed

jobs:
  detect-cycles:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check if relevant files changed
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --json files \
            --jq '[.files[].path | select(test("^src/.*\\.tsx?$|\\.understand-anything/knowledge-graph\\.json"))] | length')
          echo "relevant=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - if: steps.changes.outputs.relevant != 'true'
        run: echo "No TypeScript files changed — cycle detection skipped."
      - if: steps.changes.outputs.relevant == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Detect import cycles
        if: steps.changes.outputs.relevant == 'true'
        run: node scripts/detect-cycles.js
