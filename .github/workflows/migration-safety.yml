name: Migration Safety

# Enforces the expand/contract rule (AGENTS.md §4): a migration PR fails if its
# ADDED lines contain breaking DDL, because supabase-migrate.yml and the Vercel
# deploy run concurrently with no ordering gate — a breaking change can void the
# still-running build. Deliberate contract-phase drops opt out with an
# `-- expand-contract-ok: <reason>` marker in the migration.
#
# Runs on EVERY PR (no paths filter) so it can be a required status check: the
# script no-ops (exit 0) when a PR changes no migration files, so the check
# always reports. A path-filtered required check would deadlock non-migration
# PRs — GitHub would wait forever for a status that never arrives.

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: migration-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: migration-safety
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check migration safety
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --quiet origin "$BASE_REF"
          bash scripts/check-migration-safety.sh "origin/$BASE_REF"
