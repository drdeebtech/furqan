name: Migrations Fresh Apply

# Disaster-recovery guard (audit H16): a fresh `supabase start` applies every
# migration from zero against a clean local DB. This catches ordering breaks
# that the live incremental apply (supabase-migrate.yml) cannot — e.g. a policy
# referencing a function created by a LATER-timestamped migration. The bug this
# was added for: V17 feature migrations referenced public.is_admin*() before the
# public wrappers were restored; on a fresh apply (DR restore / branch / reset)
# that aborts. Now fixed by re-pointing those policies to private.is_admin*().

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migrations-fresh-apply.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migrations-fresh-apply.yml"

permissions:
  contents: read

concurrency:
  group: migrations-fresh-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fresh-apply:
    name: migrations apply from zero
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: latest

      # `supabase start` boots the local stack (seeds auth/storage schemas the
      # migrations depend on) and applies EVERY migration from zero. A migration
      # that references a not-yet-created object fails the boot — exactly the
      # fresh-apply / DR break we want to catch before it reaches a restore.
      - name: Fresh apply all migrations
        run: |
          set -euo pipefail
          supabase start
          echo "✓ All migrations applied cleanly from zero."

      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup || true
