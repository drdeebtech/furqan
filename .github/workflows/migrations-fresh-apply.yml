name: Migrations — Fresh Apply (DR Guard)

# Validates that supabase/migrations/ is self-contained: applies ALL
# migrations from zero on a local Supabase instance. This is the
# disaster-recovery guard for issue #353.
#
# Goes GREEN once supabase/migrations/00000000000000_baseline.sql exists.
# Until then it will FAIL — intentional; that failure signals the baseline
# is still missing.
#
# NOTE: This check is ADVISORY until the baseline lands; not required for merge.

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migrations-fresh-apply.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fresh-apply-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fresh-apply:
    name: supabase db reset (from zero)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check baseline exists
        run: |
          # spec 011 landed a self-contained remote-dump baseline
          # (supabase/migrations/<ts>_remote_baseline.sql = prod HEAD). Detect it
          # by glob so a future re-dump with a new timestamp doesn't break this guard.
          baseline=$(ls supabase/migrations/*_remote_baseline.sql 2>/dev/null | head -1)
          if [ -z "$baseline" ]; then
            echo "::error::No supabase/migrations/*_remote_baseline.sql found (the spec 011 baseline)."
            echo "::error::Generate it: SUPABASE_ACCESS_TOKEN=<pat> supabase db dump --linked -f supabase/migrations/<UTC-ts>_remote_baseline.sql"
            echo "::error::Then commit and push. See issue #353 / specs/011-fix-is-admin-ordering."
            exit 1
          fi
          echo "Baseline found: $baseline ($(wc -l < "$baseline") lines)"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          # Pin the CLI version: `latest` forces an unauthenticated GitHub API
          # release lookup on every run, which intermittently fails with
          # "rate limit exceeded". A fixed version downloads the asset directly.
          version: 2.102.0

      - name: Start local Supabase
        # `set -o pipefail` so a failed `supabase start` surfaces here instead of
        # being masked by the `| tail` pipe (the pipe's exit code is tail's 0),
        # which previously let the job limp on to `db reset` and fail with the
        # misleading "supabase start is not running". Retry to absorb transient
        # Docker/registry image-pull flakes.
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            if supabase start --ignore-health-check 2>&1 | tail -20; then
              exit 0
            fi
            echo "::warning::supabase start attempt ${attempt}/3 failed — stopping and retrying…"
            supabase stop --no-backup 2>/dev/null || true
            sleep 10
          done
          echo "::error::supabase start failed after 3 attempts (likely a transient image-pull/registry issue)."
          exit 1

      - name: Apply all migrations from zero
        run: |
          supabase db reset 2>&1
          echo "Migration count: $(supabase migration list | grep -c '●')"

      - name: Spot-check critical tables exist
        run: |
          supabase db query "
            SELECT table_name
            FROM information_schema.tables
            WHERE table_schema = 'public'
              AND table_name IN (
                'profiles','bookings','sessions','teacher_profiles',
                'student_progress','student_review_schedule'
              )
            ORDER BY 1
          "

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
