name: Auth Smoke on Preview

# Triggers when Vercel finishes a successful preview deploy. Runs the
# auth-smoke Playwright test (`e2e/auth-smoke.spec.ts`) against that
# preview URL — catches CSP violations and hydration regressions on the
# real deployed environment, since vercel.json security headers don't
# apply on local `next dev`.
#
# This is the missing piece from the 2026-05-04 CSP outage: the bug class
# was browser-side and only visible on a Vercel deployment, so no local
# test or build check could catch it. PR-time enforcement against the
# preview URL closes that gap.

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: auth-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: auth-smoke (preview)
    runs-on: ubuntu-latest
    # Only run for Vercel preview deployments that succeeded. Skips
    # production deployments (which already passed their own preview run)
    # and skips failed/in-progress states.
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'production' &&
      contains(github.event.deployment_status.target_url, 'vercel.app')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run auth-smoke against preview URL
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          # Vercel deployment-protection bypass token. Generated in
          # Vercel project Settings → Deployment Protection → Protection
          # Bypass for Automation, then mirrored into this repo's GH
          # Actions secrets. Without it, every preview-URL request
          # returns HTTP 401 (Vercel's gate) before our own /login etc.
          # have a chance to respond — which was the entire root cause
          # of the 26-of-90 auth-smoke failures observed in the 48h
          # preceding the 2026-05-06 audit. The spec gracefully skips
          # if this is unset against a Vercel preview, so no contributor
          # without the secret hits a confusing 401.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Testing against: $BASE_URL"
          # Override the playwright.config.ts webServer block so it doesn't
          # try to spin up a local dev server — we want to hit the preview.
          PLAYWRIGHT_NO_WEBSERVER=1 npx playwright test e2e/auth-smoke.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-report-${{ github.event.deployment.id }}
          path: playwright-report/
          retention-days: 7
