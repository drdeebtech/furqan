name: TruffleHog Secret Scan

# Live-verify secret scan on every push to main and every PR, plus a weekly
# full-history rescan. Complements GitHub's built-in partner-pattern secret
# scanning (always on for public repos) by actually testing key-shaped findings
# against their live service, and by catching generic/non-provider secrets that
# partner patterns miss — the two gaps GitHub only closes behind the paid
# Secret Protection product. The weekly run re-checks the ENTIRE history: a
# secret that went live after being committed, or that a newly added detector
# now recognizes, only surfaces on a rescan.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * 1' # Mondays 03:17 UTC — full-history rescan
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trufflehog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Push/PR runs gate on --results=verified only: the job fails solely when
      # TruffleHog proves a secret is live, so the check is high-signal and never
      # blocks a PR on a false positive (e.g. a base64 blob). Unverified hits
      # still print to the log for review without failing the build.
      # Scheduled/manual runs also fail on "unknown" (verification inconclusive —
      # provider unreachable): async, blocks nobody, and an inconclusive check on
      # a key-shaped string deserves a human look rather than silence.
      # On schedule/dispatch the action has no base/head, so it scans the entire
      # repo history instead of the push/PR diff range.
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') && '--results=verified' || '--results=verified,unknown' }}
