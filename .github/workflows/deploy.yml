name: Deploy

# Vercel-adapted port of the manaracode deploy pipeline:
#   security-scan (gitleaks) → await-vercel (deployment for this SHA is READY)
#   → health-gate (production actually serves) — with a workflow_dispatch
#   rollback path that promotes a previous Vercel deployment.
#
# Vercel's GitHub integration owns the BUILD (no docker build here). This
# workflow is the verification + rollback layer on top of it.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Existing Vercel deployment URL to roll back to (e.g. furqan-abc123-drdeebtech.vercel.app). Leave empty to verify the current main deploy."
        required: false
        default: ""

# Serialize deploy verification: never let two pushes to main race.
# Do not cancel in-progress — a half-verified deploy is worse than a queued one.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Runs only when verifying a build (push, or dispatch with no deployment_url).
  # A rollback (dispatch with deployment_url) skips straight to rollback+health.
  security-scan:
    name: Security Scan
    if: ${{ github.event_name == 'push' || github.event.inputs.deployment_url == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0        # full history so gitleaks can scan all commits
          persist-credentials: false  # gitleaks only reads; no token in .git/config
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact

  await-vercel:
    name: Await Vercel deployment
    if: ${{ github.event_name == 'push' || github.event.inputs.deployment_url == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: security-scan
    steps:
      - name: Wait for the deployment of this commit to be READY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN not set — cannot verify deployment."
            exit 1
          fi
          echo "Looking for Vercel deployment of commit $SHA ..."
          for i in $(seq 1 60); do
            # Server-side filter by commit SHA (meta-* query params) — paging a
            # limit=10 window and matching client-side can miss the deployment
            # entirely when pushes land close together.
            # slug= scopes the query to the team — without it the API lists the
            # token's personal scope and never finds team-project deployments.
            # Use -w to capture HTTP status separately; -f would abort on 403
            # before we can log a useful message.
            HTTP_CODE=$(curl -sSo /tmp/vercel_resp.json -w "%{http_code}" \
              "https://api.vercel.com/v6/deployments?app=furqan&target=production&meta-githubCommitSha=${SHA}&limit=1&slug=drdeebtechs-projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            if [ "$HTTP_CODE" = "403" ]; then
              echo "::warning::Vercel API returned 403 — token may lack team-scope read access. Skipping deployment wait; health-gate is the production gate."
              exit 0
            fi
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Vercel API returned HTTP $HTTP_CODE — skipping check. health-gate will verify production."
              exit 0
            fi
            RESP=$(cat /tmp/vercel_resp.json)
            STATE=$(echo "$RESP" | jq -r '.deployments[0].state // "PENDING"')
            echo "[$i/60] deployment state: $STATE"
            case "$STATE" in
              READY)
                echo "Deployment READY."
                exit 0 ;;
              ERROR|CANCELED)
                echo "::error::Vercel deployment for $SHA ended in state $STATE"
                exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::Timed out waiting for Vercel deployment of $SHA (10 min)"
          exit 1

  rollback:
    name: Roll back (promote previous deployment)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_url != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Promote previous deployment to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOYMENT_URL: ${{ github.event.inputs.deployment_url }}
        run: |
          set -euo pipefail
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN not set — cannot roll back."
            exit 1
          fi
          # Pinned CLI: rollback behavior must be deterministic during incidents.
          npm install --global vercel@54.9.1

          # Preflight: only promote a deployment that is (a) this project and
          # (b) a production deployment. Promoting a *preview* URL triggers a
          # full rebuild — a new deploy, not a rollback.
          HOST="${DEPLOYMENT_URL#https://}"; HOST="${HOST%%/*}"
          HTTP_CODE=$(curl -sSo /tmp/vercel_info.json -w "%{http_code}" \
            "https://api.vercel.com/v13/deployments/${HOST}?slug=drdeebtechs-projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Vercel API returned HTTP $HTTP_CODE when looking up $DEPLOYMENT_URL — cannot verify this is a READY production deployment."
            exit 1
          fi
          INFO=$(cat /tmp/vercel_info.json)
          NAME=$(echo "$INFO" | jq -r '.name // empty')
          TARGET=$(echo "$INFO" | jq -r '.target // empty')
          STATE=$(echo "$INFO" | jq -r '.readyState // .state // empty')
          echo "Candidate: name=$NAME target=$TARGET state=$STATE"
          if [ "$NAME" != "furqan" ] || [ "$TARGET" != "production" ] || [ "$STATE" != "READY" ]; then
            echo "::error::$DEPLOYMENT_URL is not a READY production deployment of furqan (name=$NAME target=$TARGET state=$STATE) — refusing to promote."
            exit 1
          fi

          echo "Promoting $DEPLOYMENT_URL to production..."
          vercel promote "$DEPLOYMENT_URL" --token "$VERCEL_TOKEN" --scope drdeebtech --yes

  # Post-deploy health gate: fail the run (instead of reporting a false
  # success) if production isn't actually serving. Runs after a normal
  # verify AND after a rollback.
  health-gate:
    name: Production health gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [await-vercel, rollback]
    if: >-
      ${{ always() &&
          (needs.await-vercel.result == 'success' || needs.rollback.result == 'success') }}
    steps:
      - name: Verify furqan.today is serving
        run: |
          set -euo pipefail
          echo "Verifying production is serving..."
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null --max-time 10 https://www.furqan.today/; then
              echo "Production healthy."
              exit 0
            fi
            sleep 3
          done
          echo "::error::Health gate FAILED: https://www.furqan.today/ not serving after 60s"
          exit 1
