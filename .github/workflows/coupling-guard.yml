name: Coupling Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coupling:
    name: High-coupling file check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Get changed files
        run: git diff --name-only origin/main...HEAD > /tmp/changed_files.txt

      - name: Run coupling guard
        run: |
          node scripts/coupling-guard.js $(cat /tmp/changed_files.txt | tr '\n' ' ') \
            > /tmp/coupling-report.txt 2>&1 || true
          cat /tmp/coupling-report.txt

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- coupling-guard-bot -->';

            const raw = fs.readFileSync('/tmp/coupling-report.txt', 'utf8').trim();

            // Only comment when a high-coupling file was touched.
            if (!raw.includes('HIGH-COUPLING')) return;

            const body = `${MARKER}\n## Coupling Guard\n\n\`\`\`\n${raw}\n\`\`\`\n\n---\n_Generated by \`scripts/coupling-guard.js\` — advisory only, not a blocker._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
