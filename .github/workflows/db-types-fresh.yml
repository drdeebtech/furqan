name: DB Types Freshness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/types/supabase.generated.ts"
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/db-types-fresh.yml"
  push:
    branches: [main]
    paths:
      - "src/types/supabase.generated.ts"
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/db-types-fresh.yml"

jobs:
  freshness:
    name: supabase.generated.ts vs live schema
    runs-on: ubuntu-latest
    # See supabase-migrate.yml for context — supabase/setup-cli@v1 still
    # ships Node 20, GitHub will force Node 24 by 2026-06-02. Opt in early.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Diff generated types against live schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: xyqscjnqfeusgrhmwjts
        run: |
          set -e

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping freshness check."
            exit 0
          fi

          supabase link --project-ref "$SUPABASE_PROJECT_REF"

          # Generate fresh types from the linked production schema.
          supabase gen types typescript --linked > /tmp/supabase.generated.fresh.ts

          if ! diff -q src/types/supabase.generated.ts /tmp/supabase.generated.fresh.ts >/dev/null; then
            echo "::error::src/types/supabase.generated.ts is stale vs the live schema."
            echo
            echo "Run locally and commit the regenerated file:"
            echo "  npm run db:types"
            echo
            echo "Diff:"
            diff -u src/types/supabase.generated.ts /tmp/supabase.generated.fresh.ts | head -200
            exit 1
          fi

          echo "✓ Generated types match live schema."
