name: Supabase Schema Lint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"
  push:
    branches: [main]
    paths:
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"

permissions:
  contents: read

concurrency:
  group: supabase-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: supabase db lint
    runs-on: ubuntu-latest
    # See supabase-migrate.yml for context — supabase/setup-cli@v1 still
    # ships Node 20, GitHub will force Node 24 by 2026-06-02. Opt in early.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: latest

      - name: Run schema lint against linked project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping lint. Add it in repo Settings → Secrets."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db lint --linked --schema public --level warning --fail-on warning
