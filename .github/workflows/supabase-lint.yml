name: Supabase Schema Lint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"
  push:
    branches: [main]
    paths:
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"

permissions:
  contents: read

concurrency:
  group: supabase-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: supabase db lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # See supabase-migrate.yml for context — supabase/setup-cli@v1 still
    # ships Node 20, GitHub will force Node 24 by 2026-06-02. Opt in early.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Supabase CLI + link project
        uses: ./.github/actions/supabase-setup
        with:
          project-ref: ${{ vars.SUPABASE_PROJECT_REF }}
          access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run schema lint against linked project
        run: supabase db lint --linked --schema public --level warning --fail-on warning
