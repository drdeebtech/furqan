name: Supabase Schema Lint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"
  push:
    branches: [main]
    paths:
      - "src/lib/supabase/migrations/**"
      - ".github/workflows/supabase-lint.yml"

jobs:
  lint:
    name: supabase db lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run schema lint against linked project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: xyqscjnqfeusgrhmwjts
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping lint. Add it in repo Settings → Secrets."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db lint --linked --schema public --level warning --fail-on warning
