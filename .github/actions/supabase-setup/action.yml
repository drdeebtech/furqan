name: 'Supabase: install CLI + link'
description: |
  Installs the pinned Supabase CLI and links the working directory to the
  project ref. Wraps the boilerplate that was duplicated across
  db-types-fresh.yml, supabase-lint.yml, and supabase-migrate.yml.

  Caller responsibilities:
    - actions/checkout BEFORE this composite runs (different fetch options
      mean checkout stays at the caller's discretion).
    - Set the job-level env FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true (the
      upstream supabase/setup-cli still ships Node 20; opt-in to Node 24
      keeps the workflow alive past the Node-20 retirement on 2026-06-02).

  Errors loudly (exit 1) if access-token is empty. Previous behaviour in
  db-types-fresh and supabase-lint was to print a warning and exit 0; that
  was rolled into the louder error path in F16 — a missing token in
  production CI is a misconfig that should be visible, not skipped.

inputs:
  project-ref:
    description: 'Supabase project ref (e.g. xyqscjnqfeusgrhmwjts). Pass via vars.SUPABASE_PROJECT_REF.'
    required: true
  access-token:
    description: 'SUPABASE_ACCESS_TOKEN. Pass via secrets.SUPABASE_ACCESS_TOKEN.'
    required: true
  db-password:
    description: 'SUPABASE_DB_PASSWORD — needed only for migrate operations (db push, db query). Pass via secrets.SUPABASE_DB_PASSWORD.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Supabase CLI
      uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
      with:
        # Pin the CLI: `latest` floats, so an upstream codegen-format change
        # (e.g. the added `__InternalSupabase` types header) silently breaks the
        # `supabase.generated.ts vs live schema` diff on unrelated PRs. Pinned to
        # match the version already pinned in migrations-fresh-apply.yml.
        version: 2.102.0

    - name: Link project + persist auth env
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.access-token }}
        SUPABASE_DB_PASSWORD: ${{ inputs.db-password }}
        PROJECT_REF: ${{ inputs.project-ref }}
      run: |
        if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
          echo "::error::access-token input is empty. Pass secrets.SUPABASE_ACCESS_TOKEN. (Add it under Settings → Secrets → Actions.)"
          exit 1
        fi
        supabase link --project-ref "$PROJECT_REF"
        # Persist auth env so subsequent caller steps that run `supabase --linked`
        # inherit credentials. Step-level env from a composite does NOT leak
        # back to the caller, so without this, db-types-fresh / supabase-lint
        # silently fail authentication on the next step. (Sentry Seer flagged
        # this on PR #119.) GitHub masks `secrets.*` values in logs even when
        # written to $GITHUB_ENV, so this is the documented pattern.
        echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN" >> "$GITHUB_ENV"
        if [ -n "$SUPABASE_DB_PASSWORD" ]; then
          echo "SUPABASE_DB_PASSWORD=$SUPABASE_DB_PASSWORD" >> "$GITHUB_ENV"
        fi
